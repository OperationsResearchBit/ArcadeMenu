<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Dashboard</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

    <style>
        /* (Your existing styles - unchanged) */
        :root {
            --bg-color: #1a252f;
            --card-bg: #2c3e50;
            --accent-color: #deb887;
            --success-color: #2ecc71;
            --text-color: #ffffff;
            --text-muted: #bdc3c7;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 2rem 1rem;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 3rem; }
        header h1 {
            font-size: 2.8rem;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .search-bar {
            max-width: 400px; margin: 1.5rem auto; padding: 12px 16px;
            background: #243342; border: 1px solid #3a4a5a; border-radius: 50px;
            color: white; font-size: 1rem;
        }
        .main-layout { display: grid; grid-template-columns: 1fr; gap: 2rem; }
        @media (min-width: 900px) { .main-layout { grid-template-columns: 3fr 1fr; } }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.6rem; }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 1.6rem;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 160px;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--accent-color); box-shadow: 0 12px 30px rgba(222, 184, 135, 0.15); }
        .lobby-badge {
            align-self: flex-start;
            background: rgba(46, 204, 113, 0.15);
            color: var(--success-color);
            font-size: 0.78rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 9999px;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }
        .last-updated { font-size: 0.72rem; color: var(--text-muted); margin-top: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Arcade Dashboard</h1>
            <p>Operations Research Bit</p>
            <input type="text" id="searchInput" class="search-bar" placeholder="Search games or tools..." autocomplete="off">
        </header>
        <div class="main-layout">
            <main>
                <section>
                    <h2>Featured Games</h2>
                    <div class="grid" id="gamesGrid"></div>
                </section>
                <section>
                    <h2>Game Tools & Apps</h2>
                    <div class="grid" id="toolsGrid"></div>
                </section>
            </main>
            <aside class="tracker-panel">
                <h2>Local Achievements</h2>
                <ul class="achievement-list" id="achievementList"></ul>
            </aside>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY_HERE",
            authDomain: "your-project.firebaseapp.com",
            databaseURL: "https://your-project-default-rtdb.firebaseio.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:xxxxxxxxxxxxxxxx"
        };

        let db = null;

        // === Corrected Links ===
        const games = [
            { id: "castle-go", title: "Castle-Go", desc: "Strategy & conquest", href: "https://OperationsResearchBit.github.io/Castle-Go/" },
            { id: "alexandria", title: "Alexandria", desc: "Echoes of Empire builder", href: "https://OperationsResearchBit.github.io/City-Builder-Alexandria-Echoes-of-Empire/" },
            { id: "survival-rpg", title: "Survival-RPG", desc: "Endure the wilderness", href: "https://OperationsResearchBit.github.io/Survival-RPG/" },
            { id: "merge", title: "MergeHighKings", desc: "Auto-battle puzzle merge", href: "https://OperationsResearchBit.github.io/MergeHighKings/" },
            { id: "go", title: "Go", desc: "Classic game of stones", href: "https://OperationsResearchBit.github.io/Go/" }
        ];

        const tools = [
            { id: "tftiq", title: "TFTIQ", desc: "Tactics optimization", href: "https://OperationsResearchBit.github.io/TFTIQ/" },
            { id: "gamesmith", title: "GameSmithStudio", desc: "Developer toolkit", href: "https://OperationsResearchBit.github.io/GameSmithStudio/" },
            { id: "codescore", title: "CodeScore", desc: "Performance metrics", href: "https://OperationsResearchBit.github.io/CodeScore/" },
            { id: "beergame", title: "BeerGame", desc: "Supply chain simulator", href: "https://OperationsResearchBit.github.io/BeerGame/" }
        ];

        const achievementsData = [
            { id: "ach-welcome", icon: "👋", title: "First Visit", desc: "Launched the dashboard" },
            { id: "ach-gamer", icon: "🕹️", title: "Active Gamer", desc: "Played 3 or more games" },
            { id: "ach-dev", icon: "🛠️", title: "Dev Inspector", desc: "Opened a companion app" }
        ];

        function createCard(item, isGame) {
            const card = document.createElement('a');
            card.href = item.href;
            card.target = "_blank";
            card.className = "card";
            card.innerHTML = `
                <div>
                    <h3>${item.title}</h3>
                    <p>${item.desc}</p>
                </div>
                ${isGame ? `
                    <div>
                        <span class="lobby-badge" data-game="${item.id}">0 playing</span>
                        <div class="last-updated">Loading...</div>
                    </div>
                ` : ''}
            `;
            return card;
        }

        function renderGrids() {
            document.getElementById('gamesGrid').append(...games.map(g => createCard(g, true)));
            document.getElementById('toolsGrid').append(...tools.map(t => createCard(t, false)));
        }

        function renderAchievements() {
            const container = document.getElementById('achievementList');
            container.innerHTML = '';
            achievementsData.forEach(ach => {
                const li = document.createElement('li');
                li.className = `achievement-item`;
                li.id = ach.id;
                li.innerHTML = `
                    <span class="achievement-icon">${ach.icon}</span>
                    <div>
                        <h4>${ach.title}</h4>
                        <p>${ach.desc}</p>
                    </div>
                `;
                container.appendChild(li);
            });
        }

        // Firebase + Achievements + Search (same as before)
        function startFirebaseListener() {
            if (!db) return;
            db.ref('lobbies').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                document.querySelectorAll('.lobby-badge').forEach(badge => {
                    const gameId = badge.dataset.game;
                    const lobby = data[gameId] || { players: 0 };
                    badge.textContent = `${lobby.players} playing`;
                });
            });
        }

        function unlockAchievement(id) {
            if (localStorage.getItem(id) === 'true') return;
            localStorage.setItem(id, 'true');
            document.getElementById(id)?.classList.add('unlocked');
        }

        function loadAchievements() {
            achievementsData.forEach(ach => {
                if (localStorage.getItem(ach.id) === 'true') {
                    document.getElementById(ach.id)?.classList.add('unlocked');
                }
            });
        }

        function setupSearch() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase().trim();
                document.querySelectorAll('.card').forEach(card => {
                    const title = card.querySelector('h3').textContent.toLowerCase();
                    card.style.display = title.includes(term) ? '' : 'none';
                });
            });
        }

        function init() {
            renderGrids();
            renderAchievements();
            loadAchievements();
            unlockAchievement('ach-welcome');
            setupSearch();

            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                startFirebaseListener();
            } catch (e) {
                console.warn("Firebase not configured yet.");
            }
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

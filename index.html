<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Dashboard</title>
    <style>
        :root {
            --bg-color: #1a252f;
            --card-bg: #2c3e50;
            --accent-color: #deb887;
            --success-color: #2ecc71;
            --text-color: #ffffff;
            --text-muted: #bdc3c7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 2rem 1rem;
            line-height: 1.6;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.8rem;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .search-bar {
            max-width: 400px;
            margin: 1.5rem auto;
            padding: 12px 16px;
            background: #243342;
            border: 1px solid #3a4a5a;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 900px) {
            .main-layout { grid-template-columns: 3fr 1fr; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.6rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 1.6rem;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 160px;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-color);
            box-shadow: 0 12px 30px rgba(222, 184, 135, 0.15);
        }

        .card h3 { font-size: 1.25rem; margin-bottom: 0.4rem; }
        .card p { color: var(--text-muted); font-size: 0.9rem; }

        .lobby-badge {
            align-self: flex-start;
            background: rgba(46, 204, 113, 0.15);
            color: var(--success-color);
            font-size: 0.78rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 9999px;
            border: 1px solid rgba(46, 204, 113, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }

        .lobby-badge::before {
            content: '';
            width: 7px;
            height: 7px;
            background-color: var(--success-color);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success-color);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .tracker-panel {
            background-color: #222f3d;
            border-radius: 12px;
            padding: 1.8rem;
            border: 1px solid #2c3e50;
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .achievement-item {
            background: #1a252f;
            padding: 1rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0.45;
            transition: all 0.4s ease;
        }

        .achievement-item.unlocked {
            opacity: 1;
            border-left: 4px solid var(--success-color);
            background: rgba(46, 204, 113, 0.08);
        }

        .achievement-icon { font-size: 1.8rem; flex-shrink: 0; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Arcade Dashboard</h1>
            <p>Choose your adventure • Live lobbies updating</p>
            <input type="text" id="searchInput" class="search-bar" placeholder="Search games or tools..." autocomplete="off">
        </header>

        <div class="main-layout">
            <main>
                <section>
                    <h2>Featured Games</h2>
                    <div class="grid" id="gamesGrid"></div>
                </section>

                <section>
                    <h2>Game Tools & Apps</h2>
                    <div class="grid" id="toolsGrid"></div>
                </section>
            </main>

            <aside class="tracker-panel">
                <h2>Local Achievements</h2>
                <ul class="achievement-list" id="achievementList"></ul>
            </aside>
        </div>
    </div>

    <script>
        // === DATA ===
        const games = [
            { id: "castle-go", title: "Castle-Go", desc: "Strategy & conquest", href: "/castle-go" },
            { id: "alexandria", title: "Alexandria", desc: "Echoes of Empire builder", href: "/alexandria-echoes" },
            { id: "survival-rpg", title: "Survival-RPG", desc: "Endure the wilderness", href: "/survival-rpg" },
            { id: "merge", title: "MergeHighKings", desc: "Auto-battle puzzle merge", href: "/merge-high-kings" },
            { id: "go", title: "Go", desc: "Classic game of stones", href: "/go" }
        ];

        const tools = [
            { id: "tftiq", title: "TFTIQ", desc: "Tactics optimization", href: "/tftiq" },
            { id: "gamesmith", title: "GameSmithStudio", desc: "Developer toolkit", href: "/gamesmith-studio" },
            { id: "codescore", title: "CodeScore", desc: "Performance metrics", href: "/code-score" },
            { id: "beergame", title: "BeerGame", desc: "Supply chain simulator", href: "/beer-game" }
        ];

        const achievementsData = [
            { id: "ach-welcome", icon: "👋", title: "First Visit", desc: "Launched the dashboard" },
            { id: "ach-gamer", icon: "🕹️", title: "Active Gamer", desc: "Played 3 or more games" },
            { id: "ach-dev", icon: "🛠️", title: "Dev Inspector", desc: "Opened a companion app" }
        ];

        // === RENDER FUNCTIONS ===
        function createCard(item, isGame) {
            const card = document.createElement('a');
            card.href = item.href;
            card.className = "card";
            card.setAttribute('aria-label', `Play ${item.title}`);
            
            card.innerHTML = `
                <div>
                    <h3>${item.title}</h3>
                    <p>${item.desc}</p>
                </div>
                ${isGame ? `<span class="lobby-badge" data-game="${item.id}">0 playing</span>` : ''}
            `;
            return card;
        }

        function renderGrids() {
            document.getElementById('gamesGrid').append(...games.map(g => createCard(g, true)));
            document.getElementById('toolsGrid').append(...tools.map(t => createCard(t, false)));
        }

        function renderAchievements() {
            const container = document.getElementById('achievementList');
            container.innerHTML = '';
            
            achievementsData.forEach(ach => {
                const li = document.createElement('li');
                li.className = `achievement-item`;
                li.id = ach.id;
                li.innerHTML = `
                    <span class="achievement-icon">${ach.icon}</span>
                    <div>
                        <h4>${ach.title}</h4>
                        <p>${ach.desc}</p>
                    </div>
                `;
                container.appendChild(li);
            });
        }

        // === LOBBY UPDATES ===
        function updateLobbies() {
            document.querySelectorAll('.lobby-badge').forEach(badge => {
                const current = parseInt(badge.textContent) || 5;
                const change = Math.floor(Math.random() * 7) - 3;
                let newCount = Math.max(2, current + change);
                
                badge.style.opacity = '0';
                setTimeout(() => {
                    badge.textContent = `${newCount} playing`;
                    badge.style.opacity = '1';
                }, 300);
            });
        }

        // === ACHIEVEMENT SYSTEM ===
        function unlockAchievement(id) {
            if (localStorage.getItem(id) === 'true') return;
            
            localStorage.setItem(id, 'true');
            const el = document.getElementById(id);
            if (el) el.classList.add('unlocked');
        }

        function loadAchievements() {
            achievementsData.forEach(ach => {
                if (localStorage.getItem(ach.id) === 'true') {
                    document.getElementById(ach.id)?.classList.add('unlocked');
                }
            });
        }

        // === SEARCH ===
        function setupSearch() {
            const input = document.getElementById('searchInput');
            input.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase().trim();
                
                document.querySelectorAll('.card').forEach(card => {
                    const title = card.querySelector('h3').textContent.toLowerCase();
                    card.style.display = title.includes(term) ? '' : 'none';
                });
            });
        }

        // === INIT ===
        function init() {
            renderGrids();
            renderAchievements();
            loadAchievements();
            unlockAchievement('ach-welcome');

            // Live lobby updates
            updateLobbies();
            setInterval(updateLobbies, 8000);

            setupSearch();

            // Demo interactions
            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', () => {
                    if (Math.random() > 0.5) unlockAchievement('ach-gamer');
                    if (card.closest('#toolsGrid')) unlockAchievement('ach-dev');
                });
            });
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
